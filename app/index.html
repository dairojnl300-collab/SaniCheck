<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0F172A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SaniCheck">
  <meta name="description" content="Inspección PSB móvil con normativa colombiana — ECODESA">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="assets/icons/favicon.png" type="image/png" sizes="32x32">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <title>SaniCheck · ECODESA</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/brand.css">
  <link rel="stylesheet" href="css/motion.css">

  <style>
    #splash {
      position: fixed; inset: 0;
      background: #0F172A;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; z-index: 9999;
      transition: opacity 0.4s ease 0.1s;
    }
    #splash.hidden { opacity: 0; pointer-events: none; }
    .spl-icon { font-size: 64px; animation: spl-pulse 1.4s ease-in-out infinite; }
    .spl-title { font-family: 'Poppins', sans-serif; font-size: 26px; font-weight: 800; color: #F1F5F9; letter-spacing: -0.02em; }
    .spl-sub { font-size: 11px; color: rgba(241,245,249,0.5); letter-spacing: 0.08em; text-transform: uppercase; }
    .spl-bar { width: 48px; height: 3px; background: rgba(241,245,249,0.15); border-radius: 2px; overflow: hidden; }
    .spl-fill { height: 100%; background: #10B981; animation: spl-load 0.9s ease forwards; }
    @keyframes spl-pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
    @keyframes spl-load { from{width:0} to{width:100%} }

    /* Banner instalación PWA */
    #pwa-banner {
      position: fixed; bottom: calc(68px + env(safe-area-inset-bottom, 0px) + 12px); left: 50%; transform: translateX(-50%);
      background: #1E293B; color: #F1F5F9; border: 0.5px solid #374151;
      padding: 12px 16px; border-radius: 14px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.45); z-index: 9990;
      display: flex; align-items: center; gap: 10px;
      font-size: 13px; max-width: 360px; width: calc(100% - 32px);
      animation: slide-up 0.3s ease;
    }
    @keyframes slide-up { from{transform:translateX(-50%) translateY(20px);opacity:0}
      to{transform:translateX(-50%) translateY(0);opacity:1} }
    #pwa-banner .pwa-text { flex: 1; font-weight: 500; line-height: 1.3; }
    #pwa-banner .pwa-install {
      background: #10B981; color: #fff; border: none;
      border-radius: 8px; padding: 7px 14px;
      font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap;
    }
    #pwa-banner .pwa-close {
      background: none; border: none; color: rgba(241,245,249,0.5);
      font-size: 20px; cursor: pointer; padding: 0 2px; line-height: 1;
    }

    /* Banner actualización Service Worker */
    .sw-update-banner {
      position: fixed; top: 0; left: 0; right: 0; z-index: 10000;
      display: flex; align-items: center; justify-content: center; gap: 12px;
      flex-wrap: wrap; padding: 10px 16px;
      background: #0A7350; color: #fff;
      font-size: 13px; font-weight: 600;
      box-shadow: 0 2px 12px rgba(0,0,0,0.2);
    }
    .sw-update-btn {
      background: #fff; color: #0A7350; border: none;
      padding: 7px 16px; border-radius: 999px;
      font-weight: 700; font-size: 12px; cursor: pointer; white-space: nowrap;
    }
    body.has-sw-update .phva-topbar { margin-top: 44px; }
    body.has-sw-update #screen-area { scroll-padding-top: 44px; }
  </style>
</head>
<body>

  <!-- Splash screen -->
  <div id="splash">
    <img src="assets/icons/icon-192.png" alt="SaniCheck"
      style="width:80px;height:80px;border-radius:20px;animation:spl-pulse 1.4s ease-in-out infinite;">
    <div class="spl-title">SaniCheck</div>
    <div class="spl-sub">ECODESA · Ing. S.A.S</div>
    <div class="spl-bar"><div class="spl-fill"></div></div>
  </div>

  <!-- App shell -->
  <div id="app">
    <header class="phva-topbar">
      <button type="button" class="phva-logo" onclick="Router.go('home')" title="Ir al inicio"
        style="background:none;border:none;cursor:pointer;padding:0;display:flex;align-items:center;gap:8px;color:inherit;">
        <svg viewBox="0 0 24 24" fill="none" stroke="#10B981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 3l7 3v6c0 5-3.5 8-7 9c-3.5-1-7-4-7-9V6l7-3z"/>
          <path d="M9.2 12.2l1.9 1.9l3.7-4.3"/>
        </svg>
        <span class="phva-logo-text">SaniCheck</span>
      </button>
      <button type="button" id="btn-ajustes-top" onclick="Router.go('about')" title="Ajustes · Portal Cliente"
        aria-label="Ajustes"
        style="margin-left:auto;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.22);
          color:#fff;border-radius:10px;padding:8px 10px;cursor:pointer;display:inline-flex;
          align-items:center;gap:6px;font-size:12px;font-weight:600;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
        Ajustes
      </button>
    </header>
    <main id="screen-area"></main>
    <nav class="tab-bar">
      <div class="phva-steps">
        <button class="phva-step" data-fase="P" onclick="Router.go('planificar')" title="Planificar">
          <svg class="step-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <rect width="8" height="4" x="8" y="2" rx="1" ry="1"/>
            <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
            <path d="M12 11h4"/><path d="M12 16h4"/><path d="M8 11h.01"/><path d="M8 16h.01"/>
          </svg>
          <span class="step-name">Planificar</span>
        </button>
        <button class="phva-step" data-fase="H" onclick="Router.go('hacer')" title="Hacer">
          <svg class="step-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <rect width="8" height="4" x="8" y="2" rx="1" ry="1"/>
            <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
            <path d="m9 14 2 2 4-4"/>
          </svg>
          <span class="step-name">Hacer</span>
        </button>
        <button class="phva-step" data-fase="V" onclick="Router.go('verificar')" title="Verificar">
          <svg class="step-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 3v16a2 2 0 0 0 2 2h16"/>
            <path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/>
          </svg>
          <span class="step-name">Verificar</span>
        </button>
        <button class="phva-step" data-fase="A" onclick="Router.go('actuar')" title="Actuar">
          <svg class="step-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/>
            <path d="M14 2v4a2 2 0 0 0 2 2h4"/>
            <path d="m9 15 2 2 4-4"/>
          </svg>
          <span class="step-name">Actuar</span>
        </button>
      </div>
    </nav>
  </div>

  <!-- Scripts -->
  <script src="js/logic/psb-data.js"></script>
  <script src="js/logic/checklist-config.js"></script>
  <script src="js/logic/diagnostico-inicial.js"></script>
  <script src="js/logic/vencimientos.js"></script>
  <script src="js/logic/vencimientos-storage.js"></script>
  <script src="js/logic/vencimientos-v2-crud.js"></script>
  <script src="js/phva/vencimientos-dashboard.js"></script>
  <script src="js/portal-config.js"></script>
  <script src="js/portal-cliente.js"></script>
  <script src="js/store.js"></script>
  <script src="js/router.js"></script>
  <script src="js/motion.js"></script>
  <script src="js/logic/observaciones.js"></script>
  <script src="js/logic/scores.js"></script>
  <script src="js/logic/hallazgos.js"></script>
  <script src="js/logic/fotos.js"></script>
  <script src="js/logic/dadis-scoring.js"></script>
  <script src="js/licencias.js"></script>
  <script src="js/app-version.js"></script>
  <script src="js/sw-update.js"></script>
  <script src="js/about.js"></script>
  <script src="js/phva-icons.js"></script>
  <script src="js/phva/planificar.js"></script>
  <script src="js/phva/personalizar.js"></script>
  <script src="js/phva/hacer.js"></script>
  <script src="js/phva/verificar.js"></script>
  <script src="js/phva/actuar.js"></script>
  <script src="js/screens/dadis-simulador.js"></script>
  <script src="js/app.js"></script>

  <script>
    // Splash
    window.addEventListener('load', function () {
      setTimeout(function () {
        var s = document.getElementById('splash');
        if (s) s.classList.add('hidden');
      }, 950);
    });

    // PWA install prompt
    var _pwaPrompt = null;
    window.addEventListener('beforeinstallprompt', function (e) {
      e.preventDefault();
      _pwaPrompt = e;
      // Mostrar banner 4 segundos después de cargar (solo si no está instalada)
      setTimeout(function () {
        if (!window.matchMedia('(display-mode: standalone)').matches) {
          _mostrarBannerPWA();
        }
      }, 4000);
    });

    function _mostrarBannerPWA() {
      if (document.getElementById('pwa-banner')) return;
      var b = document.createElement('div');
      b.id = 'pwa-banner';
      b.innerHTML =
        '<span style="display:inline-flex;color:var(--color-accent);">' + AppIcons.block('shieldCheck', 24) + '</span>' +
        '<span class="pwa-text">Instala SaniCheck para usar sin conexión</span>' +
        '<button class="pwa-install" onclick="_instalarPWA()">Instalar</button>' +
        '<button class="pwa-close" onclick="this.parentElement.remove()" style="display:inline-flex;align-items:center;justify-content:center;">' + AppIcons.icon('x', 16) + '</button>';
      document.body.appendChild(b);
    }

    window._instalarPWA = async function () {
      if (!_pwaPrompt) return;
      _pwaPrompt.prompt();
      var result = await _pwaPrompt.userChoice;
      if (result.outcome === 'accepted') {
        var b = document.getElementById('pwa-banner');
        if (b) b.remove();
      }
      _pwaPrompt = null;
    };

    window.addEventListener('appinstalled', function () {
      var b = document.getElementById('pwa-banner');
      if (b) b.remove();
    });
  </script>

</body>
</html>
