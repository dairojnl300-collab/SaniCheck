<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1B4332">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SaniCheck">
  <meta name="description" content="Inspección PSB móvil con normativa colombiana — ECODESA">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="assets/icons/favicon.png" type="image/png" sizes="32x32">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <title>SaniCheck · ECODESA</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/brand.css">

  <style>
    #splash {
      position: fixed; inset: 0;
      background: #1B4332;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; z-index: 9999;
      transition: opacity 0.4s ease 0.1s;
    }
    #splash.hidden { opacity: 0; pointer-events: none; }
    .spl-icon { font-size: 64px; animation: spl-pulse 1.4s ease-in-out infinite; }
    .spl-title { font-size: 26px; font-weight: 900; color: #fff; letter-spacing: -0.02em; }
    .spl-sub { font-size: 11px; color: rgba(255,255,255,0.55); letter-spacing: 0.08em; text-transform: uppercase; }
    .spl-bar { width: 48px; height: 3px; background: rgba(255,255,255,0.2); border-radius: 2px; overflow: hidden; }
    .spl-fill { height: 100%; background: #52B788; animation: spl-load 0.9s ease forwards; }
    @keyframes spl-pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
    @keyframes spl-load { from{width:0} to{width:100%} }

    /* Banner instalación PWA */
    #pwa-banner {
      position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
      background: #1B4332; color: #fff;
      padding: 12px 16px; border-radius: 14px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.35); z-index: 9990;
      display: flex; align-items: center; gap: 10px;
      font-size: 13px; max-width: 360px; width: calc(100% - 32px);
      animation: slide-up 0.3s ease;
    }
    @keyframes slide-up { from{transform:translateX(-50%) translateY(20px);opacity:0}
      to{transform:translateX(-50%) translateY(0);opacity:1} }
    #pwa-banner .pwa-text { flex: 1; font-weight: 500; line-height: 1.3; }
    #pwa-banner .pwa-install {
      background: #52B788; color: #fff; border: none;
      border-radius: 8px; padding: 7px 14px;
      font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap;
    }
    #pwa-banner .pwa-close {
      background: none; border: none; color: rgba(255,255,255,0.5);
      font-size: 20px; cursor: pointer; padding: 0 2px; line-height: 1;
    }
  </style>
</head>
<body>

  <!-- Splash screen -->
  <div id="splash">
    <img src="assets/icons/icon-192.png" alt="SaniCheck"
      style="width:80px;height:80px;border-radius:20px;animation:spl-pulse 1.4s ease-in-out infinite;">
    <div class="spl-title">SaniCheck</div>
    <div class="spl-sub">ECODESA · Ing. S.A.S</div>
    <div class="spl-bar"><div class="spl-fill"></div></div>
  </div>

  <!-- App shell -->
  <div id="app">
    <header class="phva-topbar">
      <div class="phva-logo">
        <img src="assets/icons/logotipo-sanicheck.png" alt="SaniCheck">
        <span class="phva-logo-text">SaniCheck</span>
      </div>
      <nav class="phva-steps">
        <button class="phva-step" data-fase="P" onclick="Router.go('planificar')" title="Planificar">
          <span class="step-label">P</span><span class="step-name">PLANIF.</span>
        </button>
        <div class="phva-sep">›</div>
        <button class="phva-step" data-fase="H" onclick="Router.go('hacer')" title="Hacer">
          <span class="step-label">H</span><span class="step-name">HACER</span>
        </button>
        <div class="phva-sep">›</div>
        <button class="phva-step" data-fase="V" onclick="Router.go('verificar')" title="Verificar">
          <span class="step-label">V</span><span class="step-name">VERIF.</span>
        </button>
        <div class="phva-sep">›</div>
        <button class="phva-step" data-fase="A" onclick="Router.go('actuar')" title="Actuar">
          <span class="step-label">A</span><span class="step-name">ACTUAR</span>
        </button>
      </nav>
    </header>
    <main id="screen-area"></main>
  </div>

  <!-- Scripts -->
  <script src="js/logic/psb-data.js"></script>
  <script src="js/store.js"></script>
  <script src="js/router.js"></script>
  <script src="js/logic/observaciones.js"></script>
  <script src="js/logic/scores.js"></script>
  <script src="js/logic/hallazgos.js"></script>
  <script src="js/logic/fotos.js"></script>
  <script src="js/licencias.js"></script>
  <script src="js/phva/planificar.js"></script>
  <script src="js/phva/hacer.js"></script>
  <script src="js/phva/verificar.js"></script>
  <script src="js/phva/actuar.js"></script>
  <script src="js/app.js"></script>

  <script>
    // Splash
    window.addEventListener('load', function () {
      setTimeout(function () {
        var s = document.getElementById('splash');
        if (s) s.classList.add('hidden');
      }, 950);
    });

    // PWA install prompt
    var _pwaPrompt = null;
    window.addEventListener('beforeinstallprompt', function (e) {
      e.preventDefault();
      _pwaPrompt = e;
      // Mostrar banner 4 segundos después de cargar (solo si no está instalada)
      setTimeout(function () {
        if (!window.matchMedia('(display-mode: standalone)').matches) {
          _mostrarBannerPWA();
        }
      }, 4000);
    });

    function _mostrarBannerPWA() {
      if (document.getElementById('pwa-banner')) return;
      var b = document.createElement('div');
      b.id = 'pwa-banner';
      b.innerHTML =
        '<span style="font-size:24px;">🌿</span>' +
        '<span class="pwa-text">Instala SaniCheck para usar sin conexión</span>' +
        '<button class="pwa-install" onclick="_instalarPWA()">Instalar</button>' +
        '<button class="pwa-close" onclick="this.parentElement.remove()">×</button>';
      document.body.appendChild(b);
    }

    window._instalarPWA = async function () {
      if (!_pwaPrompt) return;
      _pwaPrompt.prompt();
      var result = await _pwaPrompt.userChoice;
      if (result.outcome === 'accepted') {
        var b = document.getElementById('pwa-banner');
        if (b) b.remove();
      }
      _pwaPrompt = null;
    };

    window.addEventListener('appinstalled', function () {
      var b = document.getElementById('pwa-banner');
      if (b) b.remove();
    });
  </script>

</body>
</html>
