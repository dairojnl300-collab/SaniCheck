<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1B4332">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SaneamientoApp">
  <meta name="description" content="Inspección PSB móvil con normativa colombiana — ECODESA">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icons/icon.svg">
  <title>SaneamientoApp · ECODESA</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/brand.css">

  <style>
    #splash {
      position: fixed; inset: 0;
      background: #1B4332;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; z-index: 9999;
      transition: opacity 0.4s ease 0.1s;
    }
    #splash.hidden { opacity: 0; pointer-events: none; }
    .spl-icon { font-size: 64px; animation: spl-pulse 1.4s ease-in-out infinite; }
    .spl-title { font-size: 26px; font-weight: 900; color: #fff; letter-spacing: -0.02em; }
    .spl-sub { font-size: 11px; color: rgba(255,255,255,0.55); letter-spacing: 0.08em; text-transform: uppercase; }
    .spl-bar { width: 48px; height: 3px; background: rgba(255,255,255,0.2); border-radius: 2px; overflow: hidden; }
    .spl-fill { height: 100%; background: #52B788; animation: spl-load 0.9s ease forwards; }
    @keyframes spl-pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
    @keyframes spl-load { from{width:0} to{width:100%} }
  </style>
</head>
<body>

  <!-- Splash screen -->
  <div id="splash">
    <div class="spl-icon">🌿</div>
    <div class="spl-title">SaneamientoApp</div>
    <div class="spl-sub">ECODESA · Ing. S.A.S</div>
    <div class="spl-bar"><div class="spl-fill"></div></div>
  </div>

  <!-- App shell -->
  <div id="app">

    <!-- PHVA Topbar — siempre visible -->
    <header class="phva-topbar">
      <div class="phva-logo">
        <span>🌿</span>
        <span>SaneamientoApp · ECODESA</span>
      </div>
      <nav class="phva-steps">
        <button class="phva-step" data-fase="P" onclick="Router.go('planificar')" title="Planificar">
          <span class="step-label">P</span>
          <span class="step-name">PLANIF.</span>
        </button>
        <div class="phva-sep">›</div>
        <button class="phva-step" data-fase="H" onclick="Router.go('hacer')" title="Hacer">
          <span class="step-label">H</span>
          <span class="step-name">HACER</span>
        </button>
        <div class="phva-sep">›</div>
        <button class="phva-step" data-fase="V" onclick="Router.go('verificar')" title="Verificar">
          <span class="step-label">V</span>
          <span class="step-name">VERIF.</span>
        </button>
        <div class="phva-sep">›</div>
        <button class="phva-step" data-fase="A" onclick="Router.go('actuar')" title="Actuar">
          <span class="step-label">A</span>
          <span class="step-name">ACTUAR</span>
        </button>
      </nav>
    </header>

    <!-- Área de pantallas -->
    <main id="screen-area"></main>

  </div>

  <!-- Scripts en orden de dependencia -->
  <script src="js/logic/psb-data.js"></script>
  <script src="js/logic/idb-fotos.js"></script>
  <script src="js/logic/observaciones.js"></script>
  <script src="js/logic/hallazgos.js"></script>
  <script src="js/logic/scores.js"></script>
  <script src="js/store.js"></script>
  <script src="js/router.js"></script>
  <script src="js/phva/planificar.js"></script>
  <script src="js/phva/hacer.js"></script>
  <script src="js/app.js"></script>

  <script>
    window.addEventListener('load', function() {
      setTimeout(function() {
        var s = document.getElementById('splash');
        if (s) s.classList.add('hidden');
      }, 950);
    });
  </script>

</body>
</html>
